<div class="h-screen w-screen flex flex-col bg-[#f8fafc] overflow-hidden selection:bg-blue-100">

  <div class="flex flex-1 overflow-hidden">

    <div class="hidden lg:flex w-1/2 bg-[#0046ad] p-20 flex-col justify-between relative overflow-hidden">
      
      <div class="absolute inset-0 opacity-15"
        style="background-image: radial-gradient(#fff 0.8px, transparent 0.8px); background-size: 20px 20px;">
      </div>

      <div class="relative z-10 animate-in fade-in slide-in-from-top-4 duration-700">
        <div class="flex items-center gap-4 mb-14">
          <div class="w-14 h-14 bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] flex items-center justify-center text-[#0046ad] font-black text-3xl transition-transform hover:scale-105 cursor-default">
            M
          </div>
          <div class="flex flex-col text-white">
            <span class="font-black text-3xl tracking-tighter uppercase italic leading-none">MAZ.</span>
            <span class="text-[10px] font-bold tracking-[0.4em] uppercase mt-1.5 opacity-70">
              Software Pvt Ltd
            </span>
          </div>
        </div>

        <h1 class="text-[82px] font-black text-white leading-[0.85] tracking-tighter mb-10 uppercase drop-shadow-sm">
          Distribution <br>
          <span class="text-blue-300">Engine<span class="text-white">.</span></span>
        </h1>

        <p class="text-blue-100/70 text-xl max-w-sm font-medium leading-relaxed italic border-l-2 border-blue-400/30 pl-6">
          Enterprise-grade distribution logic for high-velocity teams and complex architectures.
        </p>
      </div>

      <div class="relative z-10 grid grid-cols-2 gap-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="group">
          <p class="text-[11px] font-black text-blue-300 uppercase tracking-[0.2em] mb-2 group-hover:text-white transition-colors">Protocol 01</p>
          <div class="h-[1px] w-8 bg-blue-400/50 mb-3"></div>
          <p class="text-md font-bold text-white uppercase tracking-tight">Real-time Sync</p>
        </div>
        <div class="group">
          <p class="text-[11px] font-black text-blue-300 uppercase tracking-[0.2em] mb-2 group-hover:text-white transition-colors">Protocol 02</p>
          <div class="h-[1px] w-8 bg-blue-400/50 mb-3"></div>
          <p class="text-md font-bold text-white uppercase tracking-tight">Client Transparency</p>
        </div>
      </div>
    </div>

    <div class="w-full lg:w-1/2 flex items-center justify-center bg-white relative">
      <div class="absolute top-0 right-0 w-64 h-64 bg-blue-50/50 rounded-full blur-3xl -mr-32 -mt-32"></div>

      <div class="w-full max-w-md px-10 relative z-10">

        <div class="mb-14 text-left animate-in fade-in slide-in-from-left-6 duration-700">
          <h2 class="text-5xl font-black text-slate-900 tracking-tighter mb-4">
            Portal Access
          </h2>

          <p class="text-slate-400 font-bold text-[11px] uppercase tracking-[0.4em] flex items-center gap-3">
            <span class="w-8 h-[1px] bg-blue-600"></span>
            Enter Identity Credentials
          </p>
        </div>

        <div *ngIf="!showSignup" class="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-500">

          <div class="space-y-6">
            <div class="group space-y-2">
              <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1 group-focus-within:text-blue-600 transition-colors">
                Registration ID / Email
              </label>
              <input #email type="email" placeholder="e.g. RA211100..."
                class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-[20px] text-slate-900 font-bold focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 outline-none transition-all placeholder:text-slate-300" />
            </div>

            <div class="group space-y-2">
              <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-1 group-focus-within:text-blue-600 transition-colors">
                Account Password
              </label>
              <input #password type="password" placeholder="••••••••"
                class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-[20px] text-slate-900 font-bold focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 outline-none transition-all placeholder:text-slate-300" />
            </div>

            <div *ngIf="errorMessage"
              class="bg-rose-50 border border-rose-100 p-4 rounded-2xl animate-in zoom-in-95 duration-300">
              <p class="text-[12px] font-bold text-rose-600 uppercase tracking-tighter flex items-center gap-3">
                <span class="w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>
                {{ errorMessage }}
              </p>
            </div>
          </div>

          <button (click)="login(email.value, password.value)" [disabled]="loading"
            class="w-full py-5 bg-[#0046ad] hover:bg-[#003584] disabled:bg-slate-200 rounded-[22px] text-white font-black uppercase tracking-[0.2em] text-xs shadow-2xl shadow-blue-700/25 transition-all active:scale-[0.98] flex items-center justify-center gap-4 group">
            <span class="tracking-[0.25em]">{{ loading ? 'Authenticating System...' : 'Verify & Sign In' }}</span>
            <span class="text-xl leading-none group-hover:translate-x-1 transition-transform" *ngIf="!loading">›</span>
          </button>

          <div class="pt-6 text-center">
            <button (click)="toggleView()"
              class="text-[11px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-700 transition-all group">
              No Account?
              <span class="text-blue-700 underline decoration-2 underline-offset-8 group-hover:decoration-blue-400">
                Request Client Access
              </span>
            </button>
          </div>
        </div>

        <div *ngIf="showSignup" class="space-y-6 animate-in fade-in slide-in-from-bottom-6 duration-500">
          <div class="p-10 space-y-5 bg-white border border-slate-100 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.04)]">
            <h2 class="text-slate-900 text-2xl font-black uppercase tracking-tight mb-4">
              Client Onboarding
            </h2>

            <div class="space-y-4">
              <input #signupName type="text" placeholder="Full Legal Name"
                class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none text-sm focus:border-blue-600 focus:bg-white transition-all" />
              <input #signupPhone type="text" placeholder="Contact Number"
                class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none text-sm focus:border-blue-600 focus:bg-white transition-all" />
              <input #signupEmail type="email" placeholder="Email Address"
                class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none text-sm focus:border-blue-600 focus:bg-white transition-all" />
              <input #signupPassword type="password" placeholder="Security Password"
                class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none text-sm focus:border-blue-600 focus:bg-white transition-all" />
            </div>

            <div *ngIf="errorMessage" class="text-rose-600 text-[11px] font-bold uppercase text-center tracking-widest pt-2">
              {{errorMessage}}
            </div>

            <button (click)="signup(signupName.value, signupPhone.value, signupEmail.value, signupPassword.value)"
              [disabled]="loading"
              class="w-full py-5 mt-6 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-white font-black uppercase tracking-widest text-xs shadow-xl shadow-emerald-700/20 transition-all active:scale-[0.98]">
              {{ loading ? 'Processing Identity...' : 'Initialize Account' }}
            </button>
          </div>

          <button (click)="toggleView()"
            class="w-full text-center text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-700 transition-colors">
            Return to Secure Login
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
