<div class="flex flex-col h-screen bg-[#f8fafc] overflow-hidden">
  <header class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-8 shrink-0 z-20">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-700 rounded flex items-center justify-center text-white font-black text-sm">M</div>
      <div>
        <h1 class="text-[10px] font-black text-slate-800 tracking-tighter leading-none uppercase">Maz Software</h1>
        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Manager Portal</p>
      </div>
    </div>

    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2 px-3 py-1.5 bg-blue-50 rounded-full">
        <div class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
        <span class="text-[9px] font-black text-blue-700 uppercase tracking-widest">Encrypted Session</span>
      </div>
      
      <div class="flex items-center gap-4 border-l border-slate-100 pl-6">
        <div class="text-right">
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Logged in as</p>
          <p class="text-xs font-black text-slate-800">{{ userData?.name || 'Loading...' }}</p>
        </div>
        <button (click)="logout()" class="px-4 py-2 bg-blue-700 text-white text-[10px] font-black uppercase tracking-widest rounded-lg hover:bg-blue-800 transition-all">
          Logout
        </button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
      <div class="p-8 mb-4">
        <div class="flex items-center gap-3 mb-1">
          <div class="w-8 h-8 bg-blue-700 rounded flex items-center justify-center text-white font-bold text-sm">M</div>
          <span class="font-black text-slate-800 tracking-tight text-lg">MAZ.</span>
        </div>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Management System</p>
      </div>

      <nav class="flex-1 px-4 space-y-2">
        <button (click)="activeTab = 'dashboard'" [class]="activeTab === 'dashboard' ? 'bg-blue-700 text-white shadow-lg shadow-blue-700/20' : 'text-slate-500 hover:bg-slate-50'"
          class="w-full flex items-center gap-3 px-5 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all">
          Dashboard
        </button>
        <button (click)="activeTab = 'employees'" [class]="activeTab === 'employees' ? 'bg-blue-700 text-white shadow-lg shadow-blue-700/20' : 'text-slate-500 hover:bg-slate-50'"
          class="w-full flex items-center gap-3 px-5 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all">
          Employee List
        </button>
        <button (click)="activeTab = 'register'" [class]="activeTab === 'register' ? 'bg-blue-700 text-white shadow-lg shadow-blue-700/20' : 'text-slate-500 hover:bg-slate-50'"
          class="w-full flex items-center gap-3 px-5 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all">
          Register Staff
        </button>
        <button (click)="activeTab = 'account'" [class]="activeTab === 'account' ? 'bg-blue-700 text-white shadow-lg shadow-blue-700/20' : 'text-slate-500 hover:bg-slate-50'"
          class="w-full flex items-center gap-3 px-5 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all">
          My Account
        </button>
      </nav>

      <div class="p-6 border-t border-slate-100">
        <button (click)="logout()" class="w-full py-3 rounded-xl border border-rose-100 text-rose-500 text-xs font-bold hover:bg-rose-50 transition-all">
          Sign Out
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
      <main class="flex-1 p-12 overflow-y-auto bg-[#f8fafc]">
        
        <div *ngIf="activeTab === 'dashboard'" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
          <app-dashboard [userData]="userData" [employees]="employees"></app-dashboard>
        </div>

        <div *ngIf="activeTab === 'employees'" class="animate-in fade-in duration-500">
          <app-employee-list [employees]="employees" (selectEmployee)="selectedEmployee = $event"></app-employee-list>
        </div>

        <div *ngIf="activeTab === 'register'" class="animate-in zoom-in-95 duration-300">
          <app-register-staff (refresh)="fetchEmployees()"></app-register-staff>
        </div>

        <div *ngIf="activeTab === 'account' && userData" class="animate-in fade-in duration-500">
          <app-my-account [userData]="userData"></app-my-account>
        </div>

      </main>

      <footer class="h-10 bg-white border-t border-slate-100 px-8 flex items-center justify-between shrink-0">
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">
          © 2026 MAZ SOFTWARE PRIVATE LIMITED • MANAGER PORTAL
        </p>
        <div class="flex items-center gap-6">
          <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">
            Security <span class="text-emerald-500">V4.0 Active</span>
          </p>
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">
            Identity: <span class="text-blue-700 font-black">{{ userData?.email }}</span>
          </p>
        </div>
      </footer>
    </div>
  </div>

  <app-employee-detail 
    *ngIf="selectedEmployee" 
    [employee]="selectedEmployee" 
    (close)="selectedEmployee = null">
  </app-employee-detail>
</div>
